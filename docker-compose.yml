services:
  web:
    build:
      context: .
      dockerfile: docker/app.Dockerfile
    env_file:
      - .env.local
    ports:
      - "8000:8000"

  tests:
    build:
      context: .
      dockerfile: docker/tests.Dockerfile
    env_file:
      - .env.local
    environment:
      BASE_URL: http://web:8000
      HEADLESS: true
    depends_on:
      - web
    volumes:
      - ./automation/reports:/automation/reports