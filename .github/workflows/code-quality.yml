name: Code Quality

on:
  pull_request:
  push:

jobs:
  quality:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: automation

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Ruff
        run: ruff check .

      - name: Mypy
        run: mypy .