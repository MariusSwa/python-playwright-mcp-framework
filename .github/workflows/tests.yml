name: Run Automation Tests

on:
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    container:
      image: mcr.microsoft.com/playwright/python:v1.52.0-noble

    defaults:
      run:
        working-directory: automation

    env:
      APP_ENV: test
      BASE_URL: http://localhost:8000
      BROWSER: chromium
      HEADLESS: true
      TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
      TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install automation dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install --with-deps

      # Start the test server / demo site
      - name: Start demo site
        working-directory: app
        run: python -m http.server 8000 &

      - name: Wait for demo site
        run: |
          python - <<'PY'
          import time
          import urllib.request

          url = "http://localhost:8000"

          for _ in range(20):
              try:
                  urllib.request.urlopen(url, timeout=2)
                  print("Demo site is running")
                  break
              except Exception:
                  time.sleep(1)
          else:
              raise RuntimeError("Demo site did not start")
          PY

      - name: Run tests
        run: pytest

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: automation-report
          path: automation/reports/