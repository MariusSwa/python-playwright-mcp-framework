<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile</title>
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body data-page="profile">
  <header class="topbar">
    <a class="brand" href="dashboard.html">Test Framework Demo</a>
    <nav aria-label="Primary navigation">
      <a href="dashboard.html">Dashboard</a>
      <a href="products.html">Products</a>
      <a href="cart.html">Cart</a>
      <a href="profile.html" aria-current="page">Profile</a>
    </nav>
    <button type="button" data-action="logout">Logout</button>
  </header>

  <main class="page-shell narrow">
    <section class="page-header">
      <h1>Profile</h1>
    </section>

    <form id="profile-form" class="form-stack" novalidate>
      <div class="field">
        <label for="first-name">First Name</label>
        <input id="first-name" name="firstName" type="text" placeholder="Test">
      </div>

      <div class="field">
        <label for="last-name">Last Name</label>
        <input id="last-name" name="lastName" type="text" placeholder="User">
      </div>

      <div class="field">
        <label for="profile-email">Email</label>
        <input id="profile-email" name="email" type="email" placeholder="test@example.com">
      </div>

      <p id="profile-message" class="message" role="status" aria-live="polite" data-testid="profile-message"></p>

      <button type="submit">Save Profile</button>
    </form>
  </main>

  <script src="assets/js/app.js"></script>
</body>
</html>
