<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body data-page="login">
  <main class="auth-layout">
    <section class="auth-panel" aria-labelledby="login-heading">
      <p class="site-label">Test Framework Demo</p>
      <h1 id="login-heading">Login</h1>

      <form id="login-form" class="form-stack" novalidate>
        <div class="field">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" placeholder="test@example.com" autocomplete="email" required>
        </div>

        <div class="field">
          <label for="password">Password</label>
          <input id="password" name="password" type="password" placeholder="Password123" autocomplete="current-password" required>
        </div>

        <label class="checkbox-field" for="remember-me">
          <input id="remember-me" name="rememberMe" type="checkbox">
          <span>Remember Me</span>
        </label>

        <p id="login-message" class="message" role="alert" aria-live="polite" data-testid="login-message"></p>

        <button type="submit">Login</button>
      </form>
    </section>
  </main>

  <script src="assets/js/app.js"></script>
</body>
</html>
